name: build_and_push_lambda_image

on:
  push:
    branches:
      - main
    paths:
      - 'lambda/**'
      - '!lambda/docker-compose.yml'

  workflow_dispatch:
    inputs:
      lambda_tag:
        description: 'Custom tag for Lambda image (optional)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-lambda:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set Lambda image tag
        id: set-tag
        run: |
          if [ -n "${{ inputs.lambda_tag }}" ]; then
            # Use custom tag if provided via workflow_dispatch
            echo "tag=lambda-${{ inputs.lambda_tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ]; then
            # For push to main, use commit SHA
            echo "tag=lambda-sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            # Fallback to latest
            echo "tag=lambda-latest" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Lambda image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: nzambe-ecr-repo
          IMAGE_TAG: ${{ steps.set-tag.outputs.tag }}
        run: |
          docker build \
            -f lambda/s3-indexer/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "✅ Pushed Lambda image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
