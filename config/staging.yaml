# Staging environment configuration
# Overrides base.yaml settings for staging deployment

# Example: Use smaller batch sizes for resource-constrained staging environment
llm:
  query_model:
    platform: "openai"
    name: "gpt-5-nano-2025-08-07"
  embedding_model:
    name: "text-embedding-3-small"
    platform: "openai"
    tokenizer: "cl100k_base"

index:
  insert_batch_size: 1024

query_engine:
  similarity_top_k: 2

data:
  vector_store_bucket: "nzambe-s3-vectors-storage"

eval: null
